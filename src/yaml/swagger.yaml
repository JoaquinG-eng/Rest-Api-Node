openapi: 3.0.0

info:
  title: MiniBlog API
  version: 1.0.0
  description: API REST para gestionar autores y posts de un blog

servers:
  - url: https://rest-api-node-production-551b.up.railway.app
    description: Producción (Railway)
  - url: http://localhost:3000
    description: Local

tags:
  - name: Authors
    description: Operaciones relacionadas a autores
  - name: Posts
    description: Operaciones relacionadas a posts

components:
  schemas:

    Author:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Juan Pérez
        email:
          type: string
          example: juan@mail.com
        bio:
          type: string
          example: Desarrollador backend
      required:
        - name
        - email

    Post:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: Mi primer post
        content:
          type: string
          example: Contenido del post
        author_id:
          type: integer
          example: 1
      required:
        - title
        - content
        - author_id

paths:

  /api/authors:
    get:
      tags: [Authors]
      summary: Obtener todos los autores
      responses:
        200:
          description: Lista de autores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Author'

    post:
      tags: [Authors]
      summary: Crear un nuevo autor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Author'
      responses:
        201:
          description: Autor creado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Author'
        400:
          description: Datos inválidos

  /api/authors/{id}:
    get:
      tags: [Authors]
      summary: Obtener autor por ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Autor encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Author'
        404:
          description: Autor no encontrado

    put:
      tags: [Authors]
      summary: Actualizar autor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Author'
      responses:
        200:
          description: Autor actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Author'
        404:
          description: Autor no encontrado

    delete:
      tags: [Authors]
      summary: Eliminar autor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Autor eliminado
        404:
          description: Autor no encontrado

  /api/posts:
    get:
      tags: [Posts]
      summary: Obtener todos los posts
      responses:
        200:
          description: Lista de posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Post'

    post:
      tags: [Posts]
      summary: Crear un nuevo post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Post'
      responses:
        201:
          description: Post creado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        400:
          description: Datos inválidos

  /api/posts/{id}:
    get:
      tags: [Posts]
      summary: Obtener post por ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Post encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        404:
          description: Post no encontrado

    put:
      tags: [Posts]
      summary: Actualizar post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Post'
      responses:
        200:
          description: Post actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        404:
          description: Post no encontrado

    delete:
      tags: [Posts]
      summary: Eliminar post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Post eliminado
        404:
          description: Post no encontrado

  /api/posts/author/{authorId}:
    get:
      tags: [Posts]
      summary: Obtener posts por autor
      parameters:
        - name: authorId
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Lista de posts del autor
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Post'